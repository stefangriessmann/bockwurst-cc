<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:comment>Tour-Highlights-CE – Karten (km-Marke · Titel · Kurztext) aus der Tour-JSON
(Feld „highlights"). Look: tour-detail.html.</f:comment>

<f:asset.css identifier="bockwurst-tour" href="EXT:bockwurst_sitepackage/Resources/Public/Css/bockwurst-tour.css" />

<f:if condition="{tour.highlights}">
    <f:then>
        <section class="bw-highlights-wrap">
            <div class="bw-seclab"><span class="bw-seclab-line"></span><f:if condition="{data.header}"><f:then>{data.header}</f:then><f:else>Highlights entlang der Strecke</f:else></f:if></div>
            <div class="bw-hl-list">
                <f:for each="{tour.highlights}" as="hl">
                    <div class="bw-hl">
                        <f:if condition="{hl.km}"><span class="bw-hl-km">{hl.km}</span></f:if>
                        <div class="bw-hl-body">
                            <div class="bw-hl-t">{hl.title}</div>
                            <f:if condition="{hl.text}"><div class="bw-hl-d">{hl.text}</div></f:if>
                        </div>
                    </div>
                </f:for>
            </div>
        </section>
    </f:then>
    <f:else>
        <p class="bw-tour-hint">Keine Highlights hinterlegt<f:if condition="{tourError}"> – {tourError}</f:if></p>
    </f:else>
</f:if>
</html>
