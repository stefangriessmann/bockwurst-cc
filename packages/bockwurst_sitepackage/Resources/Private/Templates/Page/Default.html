<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:comment>bockwurst.cc – eigenes Page-Template: Header (Logo) + Content (colPos 0) + Slim-Footer.
Self-contained (kein separates Layout) – umgeht den BSP-Default-Frame, nutzt aber BSPs
lib.dynamicContent fürs Content-Rendering.</f:comment>
<div id="top" class="bw-page">

    <header class="bw-header">
        <div class="bw-container bw-header-inner">
            <f:render partial="Header/Logo" arguments="{_all}" />
            <nav class="bw-nav" aria-label="Hauptnavigation">
                <a class="bw-nav-link" href="https://bockwurst-events.netlify.app/event-guide">Event-Guide</a>
            </nav>
        </div>
    </header>

    <main id="page-content" class="bw-main">
        <div class="bw-container">
            <f:cObject typoscriptObjectPath="lib.dynamicContent" data="{pageUid: '{data.uid}', colPos: '0'}" />
        </div>
    </main>

    <f:render partial="Footer" arguments="{_all}" />

</div>
</html>
