<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">
<f:comment>Touren-Karten-Raster. Erwartet {tourGrid} (aus TourGridProcessor).
Wiederverwendet von Home.html (Sektion „Touren") und Touren.html (Übersicht).</f:comment>
<f:if condition="{tourGrid}">
    <f:then>
        <div class="bw-tours">
            <f:for each="{tourGrid}" as="tour" iteration="it">
                <f:link.page pageUid="{tour.uid}" class="bw-tour bw-reveal" additionalAttributes="{style: 'transition-delay:{it.index * 0.06}s'}">
                    <span class="bw-tour-ph">
                        <f:if condition="{tour.image}">
                            <f:then><img src="{tour.image}" alt="" loading="lazy"></f:then>
                            <f:else><span class="bw-tour-grad" aria-hidden="true"></span></f:else>
                        </f:if>
                        <f:if condition="{tour.hasVideo}">
                            <span class="bw-tour-play" aria-hidden="true"><i></i></span>
                        </f:if>
                    </span>
                    <span class="bw-tour-bd">
                        <f:if condition="{tour.difficulty}">
                            <span class="bw-tag bw-tour-tag bw-tour-tag--{tour.difficultyModifier}">{tour.difficulty}</span>
                        </f:if>
                        <span class="bw-tour-t">{tour.title}</span>
                        <span class="bw-tour-rm">
                            <f:if condition="{tour.region}"><span>{tour.region}</span></f:if>
                            <f:if condition="{tour.distanceKm}"><span>{tour.distanceKm} km</span></f:if>
                            <f:if condition="{tour.hasVideo}"><span class="bw-tour-vid">&#9654; Video</span></f:if>
                        </span>
                    </span>
                </f:link.page>
            </f:for>
        </div>
    </f:then>
    <f:else>
        <p class="bw-soon">Touren-Raster folgt.</p>
    </f:else>
</f:if>
</html>
